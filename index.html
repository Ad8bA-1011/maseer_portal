<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maseer Media - Register</title>
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #0F172A 0%, #1e293b 100%);
            color: #F8FAFC;
            min-height: 100vh;
            padding: 2rem 1rem;
        }
        .container { max-width: 600px; margin: 0 auto; }
        h1 {
            font-size: 2rem;
            background: linear-gradient(135deg, #6B21A8, #EAB308);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-align: center;
            margin-bottom: 0.5rem;
        }
        .subtitle { text-align: center; color: #94a3b8; margin-bottom: 2rem; }
        
        .form {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 1rem;
            padding: 1.5rem;
        }
        .field { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.3rem; font-size: 0.9rem; color: #cbd5e1; }
        .required { color: #EF4444; }
        
        input, select {
            width: 100%;
            padding: 0.6rem;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 0.4rem;
            background: rgba(0,0,0,0.3);
            color: white;
            font-size: 0.95rem;
        }
        input:focus, select:focus { outline: none; border-color: #6B21A8; }
        
        .colors { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        input[type="color"] { width: 100%; height: 40px; padding: 0; border: none; }
        
        .checkbox {
            display: flex;
            gap: 0.5rem;
            align-items: flex-start;
            margin: 1rem 0;
            font-size: 0.85rem;
            color: #94a3b8;
        }
        .checkbox input { width: auto; margin-top: 0.15rem; }
        
        button {
            width: 100%;
            padding: 0.9rem;
            background: linear-gradient(135deg, #6B21A8, #7c3aed);
            color: white;
            border: none;
            border-radius: 0.5rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { opacity: 0.9; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .note {
            margin-top: 1rem;
            padding: 0.75rem;
            background: rgba(234, 179, 8, 0.1);
            border-left: 3px solid #EAB308;
            font-size: 0.8rem;
            color: #94a3b8;
        }
        
        #status {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border: 1px solid rgba(16, 185, 129, 0.3);
            border-radius: 0.5rem;
            text-align: center;
        }
        #status.active { display: block; }
        #status a { color: #10B981; text-decoration: none; font-weight: 600; }
        
        .error {
            display: none;
            color: #EF4444;
            font-size: 0.8rem;
            margin-top: 0.3rem;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎯 MASEER</h1>
        <p class="subtitle">AI Video Marketing for Afghan Businesses</p>
        
        <div class="form">
            <form id="registerForm">
                <div class="field">
                    <label>Brand Name <span class="required">*</span></label>
                    <input type="text" name="brand" id="brand" required placeholder="Zarrin Jewelry" maxlength="40">
                    <div class="error" id="brandError">Required. Use letters, numbers, spaces only.</div>
                </div>
                
                <div class="field">
                    <label>Industry <span class="required">*</span></label>
                    <select name="industry" id="industry" required>
                        <option value="">Select...</option>
                        <option>Jewelry & Gold</option>
                        <option>Café & Restaurant</option>
                        <option>Fashion & Clothing</option>
                        <option>Technology & IT</option>
                        <option>Healthcare & Medical</option>
                        <option>Education & Training</option>
                        <option>Real Estate</option>
                        <option>Automotive</option>
                        <option>Beauty & Cosmetics</option>
                        <option>Construction & Materials</option>
                        <option>Consultancy & Services</option>
                        <option>Retail & Shopping</option>
                        <option>Travel & Hospitality</option>
                        <option>Agriculture</option>
                        <option>Handicrafts</option>
                    </select>
                </div>
                
                <div class="colors">
                    <div class="field">
                        <label>Primary Color <span class="required">*</span></label>
                        <input type="color" name="color1" value="#6B21A8" required>
                    </div>
                    <div class="field">
                        <label>Secondary Color</label>
                        <input type="color" name="color2" value="#EAB308">
                    </div>
                </div>
                
                <div class="field">
                    <label>WhatsApp (optional)</label>
                    <input type="text" name="whatsapp" placeholder="+93 70 123 4567">
                </div>
                
                <div class="checkbox">
                    <input type="checkbox" name="sample" id="sample" checked>
                    <label for="sample">Request FREE sample video (3-5 min)</label>
                </div>
                
                <div class="checkbox">
                    <input type="checkbox" id="terms" required>
                    <label for="terms">I agree to receive 4 daily AI marketing videos</label>
                </div>
                
                <button type="submit" id="btn">Create GitHub Issue</button>
                
                <div class="note">
                    ⚠️ You will be redirected to GitHub to complete registration. Please attach your logo in the issue comment.
                </div>
                
                <div id="status">
                    ✅ Opening GitHub...<br>
                    <a href="#" id="githubLink" target="_blank">Click here if not redirected</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            // Get values
            const brand = document.getElementById('brand').value.trim();
            const industry = document.getElementById('industry').value;
            const color1 = this.querySelector('[name="color1"]').value;
            const color2 = this.querySelector('[name="color2"]').value;
            const whatsapp = this.querySelector('[name="whatsapp"]').value.trim();
            const sample = this.querySelector('[name="sample"]').checked;
            
            // Validate
            if (!brand || brand.length < 2) {
                document.getElementById('brandError').classList.add('show');
                return;
            }
            if (!industry) {
                alert('Please select an industry');
                return;
            }
            
            // Build minimal body (NO markdown tables, NO backticks in JSON to avoid escaping issues)
            const timestamp = new Date().toISOString();
            const body = `New Registration: ${brand}

Industry: ${industry}
Primary Color: ${color1}
Secondary Color: ${color2}
WhatsApp: ${whatsapp || 'Not provided'}
Sample Requested: ${sample ? 'Yes' : 'No'}
Submitted: ${timestamp}

Data JSON:
{"brand":"${brand}","industry":"${industry}","color1":"${color1}","color2":"${color2}","whatsapp":"${whatsapp}","sample":${sample},"time":"${timestamp}"}

---
Reply with logo attachment (PNG/JPG, max 2MB)
Portal: https://Ad8bA-1011.github.io/maseer_portal/`;
            
            // Build URL - encode properly
            const title = encodeURIComponent(`New Registration: ${brand}`);
            const encodedBody = encodeURIComponent(body);
            const labels = encodeURIComponent('new-client,portal');
            
            const url = `https://github.com/Ad8bA-1011/maseer_automation/issues/new?title=${title}&body=${encodedBody}&labels=${labels}`;
            
            // Debug
            console.log('URL length:', url.length);
            console.log('URL:', url.substring(0, 200) + '...');
            
            // Show status
            document.getElementById('status').classList.add('active');
            document.getElementById('githubLink').href = url;
            document.getElementById('btn').disabled = true;
            
            // Try to open
            const newWindow = window.open(url, '_blank');
            
            // Check if popup blocked
            if (!newWindow || newWindow.closed || typeof newWindow.closed === 'undefined') {
                alert('Popup blocked! Please allow popups for this site, or click the link below.');
                document.getElementById('githubLink').style.color = '#EAB308';
            } else {
                // Success - redirect after delay
                setTimeout(() => {
                    window.location.href = 'success.html';
                }, 1000);
            }
        });
        
        // Hide error on input
        document.getElementById('brand').addEventListener('input', function() {
            document.getElementById('brandError').classList.remove('show');
        });
    </script>
</body>
</html>
