name: Deploy to Pages

on:
  push:
    branches: [ main ]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Inject token into index.html
        run: |
          sed -i 's|<head>|<head>\n  <script>window.GITHUB_CONFIG = { token: "${{ secrets.PAT_TOKEN }}" };</script>|' index.html
          head -20 index.html
      
      - uses: actions/configure-pages@v4
      
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      
      - uses: actions/deploy-pages@v4
        id: deployment
